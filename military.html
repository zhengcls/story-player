<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日全球军事动态 - AI数字人主播</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: linear-gradient(135deg, #0a0a1a, #1a1a3a); min-height: 100vh; color: #fff; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 25px; padding: 20px 0; }
        .header h1 { font-size: 28px; color: #00d4ff; text-shadow: 0 0 20px rgba(0,212,255,0.5); }
        .header .date { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 8px; }
        .video-box { background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        video { width: 100%; display: block; }
        .play-btn { width: 100%; padding: 20px; background: linear-gradient(135deg, #00d4ff, #0099cc); border: none; border-radius: 12px; font-size: 18px; font-weight: bold; color: #000; cursor: pointer; margin-bottom: 25px; }
        .stats { display: flex; gap: 15px; margin-bottom: 25px; }
        .stat-item { flex: 1; background: rgba(0,212,255,0.1); border-radius: 8px; padding: 15px; text-align: center; }
        .stat-value { font-size: 24px; color: #00d4ff; font-weight: bold; }
        .stat-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 5px; }
        .feature { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; }
        .feature-tag { background: rgba(0,212,255,0.2); padding: 8px 16px; border-radius: 20px; font-size: 13px; }
        .footer { text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎖️ 每日全球军事动态</h1>
            <div class="date">AI数字人主播 · 2026-03-25</div>
        </div>
        <div class="stats">
            <div class="stat-item"><div class="stat-value">8</div><div class="stat-label">新闻条数</div></div>
            <div class="stat-item"><div class="stat-value">AI主播</div><div class="stat-label">数字人</div></div>
            <div class="stat-item"><div class="stat-value">同步</div><div class="stat-label">口型动画</div></div>
        </div>
        <div class="feature">
            <span class="feature-tag">🎙️ 男女声交替</span>
            <span class="feature-tag">🎬 口型同步</span>
            <span class="feature-tag">🤖 AI虚拟主播</span>
        </div>
        <button class="play-btn" onclick="document.getElementById('video').scrollIntoView({behavior:'smooth'});document.getElementById('video').play();">▶️ 点击观看数字人主播</button>
        <div class="video-box">
            <video id="video" controls webkit-playsinline playsinline>
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>
        <div class="footer">AI数字人主播 · 每日更新</div>
    </div>
</body>
</html>
