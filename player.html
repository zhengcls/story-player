<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月光森林的小精灵</title>
    <style>
        body { 
            margin: 0; padding: 20px;
            background: linear-gradient(to bottom, #0a0a2e, #1a1a4e);
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 30px; }
        .start-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 10, 46, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .start-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000; border: none;
            padding: 20px 50px;
            font-size: 1.5rem; font-weight: bold;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 60px rgba(255, 215, 0, 0.8); }
        }
        .player { 
            background: rgba(255,255,255,0.1); 
            padding: 20px; border-radius: 15px;
            margin-bottom: 20px;
        }
        audio { width: 100%; margin-bottom: 15px; }
        .chapter-title { font-size: 1.2rem; margin-bottom: 10px; color: #ffd700; }
        .chapter-text { text-align: left; line-height: 1.6; color: #ddd; margin-bottom: 15px; }
        .nav { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { 
            background: #ffd700; color: #000; border: none; 
            padding: 10px 20px; border-radius: 5px; cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #ffed4e; }
        button:disabled { background: #666; cursor: not-allowed; }
        .auto-badge { 
            display: inline-block; background: #4CAF50; 
            color: white; padding: 5px 15px; 
            border-radius: 20px; font-size: 0.9rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="start-overlay" id="startOverlay">
        <button class="start-btn" onclick="startPlaying()">
            ⭐ 点击开始听故事 ⭐
        </button>
    </div>

    <div class="container">
        <h1>⭐ 月光森林的小精灵 ⭐</h1>
        <p>睡前故事 · 女声朗读</p>
        <div class="auto-badge" id="autoBadge">🔄 自动播放已开启</div>
        
        <div class="player">
            <div class="chapter-title" id="title">第一章：奇怪的种子</div>
            <audio id="player" controls>
                <source id="audioSource" src="https://zhengcls235-1259174482.cos-website.ap-guangzhou.myqcloud.com/audio/chapter-1.mp3" type="audio/mpeg">
            </audio>
            <div class="chapter-text" id="text">月光森林里，住着许多神奇的生物。有一天，小兔子蹦蹦在河边发现了一颗闪闪发光的种子。种子会发出温柔的光芒，像一颗小星星。蹦蹦决定把这颗种子带回家，种在自己的小窝旁边。</div>
        </div>
        
        <div class="nav">
            <button id="prevBtn" onclick="prevChapter()">◀ 上一章</button>
            <button id="nextBtn" onclick="nextChapter()">下一章 ▶</button>
        </div>
        
        <div style="margin-top: 15px;">
            <label>
                <input type="checkbox" id="autoPlayCheckbox" checked onchange="toggleAutoPlay()">
                自动播放下一章
            </label>
        </div>
        
        <div id="chapterList" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px;"></div>
    </div>

    <script>
        let autoPlayEnabled = true;
        let currentIndex = 0;
        
        const chapters = [{"title": "第一章：奇怪的种子", "text": "月光森林里，住着许多神奇的生物。有一天，小兔子蹦蹦在河边发现了一颗闪闪发光的种子。种子会发出温柔的光芒，像一颗小星星。蹦蹦决定把这颗种子带回家，种在自己的小窝旁边。", "url": "https://zhengcls235-1259174482.cos-website.ap-guangzhou.myqcloud.com/audio/chapter-1.mp3"}, {"title": "第二章：发芽了", "text": "第二天早上，蹦蹦醒来发现种子已经发芽了！嫩绿的小芽在月光下闪闪发光，叶子上还有露珠在跳舞。蹦蹦开心极了，她每天都来浇水，期待着小芽快快长大。", "url": "https://zhengcls235-1259174482.cos-website.ap-guangzhou.myqcloud.com/audio/chapter-2.mp3"}, {"title": "第三章：小精灵出生", "text": "一个月后的晚上，月亮特别圆特别亮。小芽突然发出了耀眼的光芒，一个小精灵从光芒中走了出来！她有着透明的翅膀，浑身闪闪发光。小精灵说：我叫闪闪，是月光森林的守护精灵！", "url": "https://zhengcls235-1259174482.cos-website.ap-guangzhou.myqcloud.com/audio/chapter-3.mp3"}, {"title": "第四章：学会魔法", "text": "闪闪教蹦蹦学习魔法。她教蹦蹦用月光施咒，用星星跳舞。蹦蹦学得很认真，很快就学会了一些简单的魔法。她能让小花发光，能让小草唱歌。", "url": "https://zhengcls235-1259174482.cos-website.ap-guangzhou.myqcloud.com/audio/chapter-4.mp3"}, {"title": "第五章：帮助森林", "text": "月光森林里有一棵生病的老橡树，他的叶子都枯黄了。闪闪带着蹦蹦去帮助老橡树。蹦蹦用刚学会的魔法，给老橡树送去了温暖的月光。老橡树的叶子慢慢变绿了。", "url": "https://zhengcls235-1259174482.cos-website.ap-guangzhou.myqcloud.com/audio/chapter-5.mp3"}, {"title": "第六章：结交新朋友", "text": "在帮助老橡树的过程中，蹦蹦认识了小鹿斑斑、小松鼠跳跳，还有一只会说话的小猫。他们成了最好的朋友，一起在月光森林里冒险。", "url": "https://zhengcls235-1259174482.cos-website.ap-guangzhou.myqcloud.com/audio/chapter-6.mp3"}, {"title": "第七章：打败黑暗", "text": "有一天，黑暗女巫来到了月光森林，她想把森林变成黑暗的世界。闪闪和蹦蹦勇敢地站了出来，他们用团结的力量，驱散了黑暗，森林又恢复了光明。", "url": "https://zhengcls235-1259174482.cos-website.ap-guangzhou.myqcloud.com/audio/chapter-7.mp3"}, {"title": "第八章：森林的守护者", "text": "从那以后，蹦蹦成为了月光森林的小小守护者。她和闪闪、斑斑、跳跳一起，每天都在森林里巡逻，保护着每一棵小草、每一朵小花。月光森林永远都是那么美丽。晚安，亲爱的宝贝。", "url": "https://zhengcls235-1259174482.cos-website.ap-guangzhou.myqcloud.com/audio/chapter-8.mp3"}];

        function toggleAutoPlay() {
            autoPlayEnabled = document.getElementById('autoPlayCheckbox').checked;
            document.getElementById('autoBadge').textContent = autoPlayEnabled ? '🔄 自动播放已开启' : '⏸️ 自动播放已关闭';
            document.getElementById('autoBadge').style.background = autoPlayEnabled ? '#4CAF50' : '#666';
        }

        function loadChapter(index) {
            if (index < 0 || index >= chapters.length) return;
            currentIndex = index;
            const ch = chapters[index];
            document.getElementById('title').textContent = ch.title;
            document.getElementById('text').textContent = ch.text;
            document.getElementById('audioSource').src = ch.url;
            document.getElementById('player').load();
            
            if (autoPlayEnabled) {
                document.getElementById('player').play().catch(e => console.log('Auto-play blocked'));
            }
            
            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === chapters.length - 1;
            document.querySelectorAll('.chapter-btn').forEach((btn, i) => {
                btn.style.background = i === index ? '#ffed4e' : '#ffd700';
            });
        }

        function prevChapter() {
            if (currentIndex > 0) loadChapter(currentIndex - 1);
        }

        function nextChapter() {
            if (currentIndex < chapters.length - 1) loadChapter(currentIndex + 1);
        }

        function startPlaying() {
            document.getElementById('startOverlay').style.display = 'none';
            loadChapter(0);
        }

        const list = document.getElementById('chapterList');
        chapters.forEach((ch, i) => {
            const btn = document.createElement('button');
            btn.className = 'chapter-btn';
            btn.textContent = '第' + (i+1) + '章';
            btn.onclick = () => {
                if (document.getElementById('startOverlay').style.display !== 'none') {
                    startPlaying();
                }
                loadChapter(i);
            };
            list.appendChild(btn);
        });

        document.getElementById('player').addEventListener('ended', function() {
            if (autoPlayEnabled && currentIndex < chapters.length - 1) {
                setTimeout(() => {
                    loadChapter(currentIndex + 1);
                }, 1000);
            }
        });
    </script>
</body>
</html>
